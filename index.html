<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Промт-ивент</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles.css">
</head>
<body class="h-screen">
  <div class="container flex h-screen">
    <div class="w-1/3 p-4 flex flex-col gap-2">
      <button id="btnAdd" class="icon-button mb-4">+</button>
      <div id="promptsList" class="flex flex-col gap-2 overflow-y-auto"></div>
    </div>
    <div class="w-2/3 flex flex-col p-4">
      <div id="chatContainer" class="flex-grow"></div>
      <div class="mt-2 flex gap-2">
        <input id="chatInput" type="text" class="flex-grow rounded-l-md" placeholder="Введите сообщение…">
        <button id="sendChatButton" class="icon-button rounded-r-md">→</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>
</html>
