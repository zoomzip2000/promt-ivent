<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Менеджер Промптов с Чатом Gemini</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .prompt-group {
            display: flex;
            align-items: center;
            gap: 0.5rem; /* space-x-2 */
        }
        .main-prompt-button {
            flex-grow: 1;
        }
        .chat-insert-button {
            flex-shrink: 0;
            padding-left: 0.75rem; /* px-3 */
            padding-right: 0.75rem; /* px-3 */
        }
        #chatContainer {
            height: 400px; 
            border: 1px solid #4a5568; /* gray-700 */
            border-radius: 0.375rem; /* rounded-md */
            overflow-y: auto;
            padding: 1rem;
            margin-bottom: 1rem;
            background-color: #1f2937; /* gray-800 */
        }
        .chat-message {
            padding: 0.5rem 0.75rem;
            border-radius: 0.375rem;
            margin-bottom: 0.5rem;
            max-width: 80%;
            word-wrap: break-word;
        }
        .user-message {
            background-color: #3b82f6; /* blue-500 */
            color: white;
            margin-left: auto;
            text-align: right;
        }
        .model-message {
            background-color: #374151; /* gray-700 */
            color: #d1d5db; /* gray-300 */
            margin-right: auto;
            text-align: left;
        }
        .chat-message img.attached-image-preview {
            max-width: 200px;
            max-height: 200px;
            border-radius: 0.25rem;
            margin-top: 0.5rem;
            display: block; /* Make it a block to control margin */
        }
        .user-message img.attached-image-preview {
            margin-left: auto; /* Align to right for user messages */
        }
        .model-message img.attached-image-preview {
            margin-right: auto; /* Align to left for model messages */
        }

        .loading-dots span {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #9ca3af; /* gray-400 */
            border-radius: 50%;
            margin: 0 2px;
            animation: blink 1.4s infinite both;
        }
        .loading-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }
        .loading-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }
        @keyframes blink {
            0% { opacity: 0.2; }
            20% { opacity: 1; }
            100% { opacity: 0.2; }
        }
        #filePreviewContainer {
            margin-top: 0.5rem;
            margin-bottom: 0.5rem;
            text-align: left;
        }
        #filePreviewContainer img {
            max-width: 100px;
            max-height: 100px;
            border-radius: 0.25rem;
            border: 1px solid #4a5568;
            margin-right: 0.5rem;
            vertical-align: middle;
        }
        #filePreviewContainer span {
            color: #9ca3af; /* gray-400 */
            font-size: 0.875rem;
            vertical-align: middle;
        }
        #removeFileButton {
            background: none;
            border: none;
            color: #ef4444; /* red-500 */
            cursor: pointer;
            font-size: 1.25rem; /* text-xl */
            padding: 0.25rem;
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-gray-900 flex flex-col justify-start items-center min-h-screen p-4 pt-8">
    <div class="w-full max-w-xl">
        <div id="feedbackMessage" class="text-center font-semibold h-8 mb-6 text-gray-300"></div>

        <div class="space-y-3 mb-8">

                    Промпт 1

                    💬
                </button>
            </div>
            <div class="prompt-group">
                <button id="btnPrompt2" class="main-prompt-button w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-4 rounded-l-lg transition duration-150 ease-in-out shadow-md hover:shadow-lg text-lg">
                    Промпт 2
                </button>
                <button id="btnChatPrompt2" class="chat-insert-button bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-3 rounded-r-lg transition duration-150 ease-in-out shadow-md hover:shadow-lg text-lg" title="Вставить Промпт 2 в чат">
                    💬
                </button>
            </div>

            <div class="prompt-group">
                <button id="btnPrompt3" class="main-prompt-button w-full bg-sky-500 hover:bg-sky-600 text-white font-bold py-3 px-4 rounded-l-lg transition duration-150 ease-in-out shadow-md hover:shadow-lg text-lg">
                    Промпт 3
                </button>
                <button id="btnChatPrompt3" class="chat-insert-button bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-3 rounded-r-lg transition duration-150 ease-in-out shadow-md hover:shadow-lg text-lg" title="Вставить Промпт 3 в чат">
                    💬
                </button>
            </div>

            <div class="prompt-group">
                <button id="btnPrompt4" class="main-prompt-button w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-4 rounded-l-lg transition duration-150 ease-in-out shadow-md hover:shadow-lg text-lg">
                    Промпт 4
                </button>
                <button id="btnChatPrompt4" class="chat-insert-button bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-3 rounded-r-lg transition duration-150 ease-in-out shadow-md hover:shadow-lg text-lg" title="Вставить Промпт 4 в чат">
                    💬
                </button>
            </div>

            <div class="prompt-group">
                <button id="btnPrompt5" class="main-prompt-button w-full bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-4 rounded-l-lg transition duration-150 ease-in-out shadow-md hover:shadow-lg text-lg">
                    Промпт 5
                </button>
                <button id="btnChatPrompt5" class="chat-insert-button bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 px-3 rounded-r-lg transition duration-150 ease-in-out shadow-md hover:shadow-lg text-lg" title="Вставить Промпт 5 в чат">
                    💬

        <div class="bg-gray-800 p-4 sm:p-6 rounded-lg shadow-xl">
            <h2 class="text-xl font-semibold text-gray-200 mb-4 text-center">Чат с Gemini</h2>
            <div id="chatContainer">
                </div>
            <div id="filePreviewContainer" class="hidden">
                 <img id="imagePreview" src="#" alt="Предпросмотр изображения"/>

            <div class="mt-4 flex items-center gap-2">

                </label>
                <input type="file" id="fileInput" class="hidden" accept="image/png, image/jpeg, image/gif, image/webp">
                <input type="text" id="chatInput" class="flex-grow p-2.5 bg-gray-700 text-gray-200 border border-gray-600 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none" placeholder="Введите ваш запрос...">
                <button id="sendChatButton" class="bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 px-5 rounded-r-md transition duration-150 ease-in-out">
                    Отправить
                </button>
            </div>
        </div>
    </div>

    <script>
        // Object to store all the prompts
        const prompts = {
            prompt1: `Ты — эксперт по анализу и отбору новостей для создания событий на рынке прогнозов. Тебе предоставлен JSON-массив новостей.

Используя метод Chain of Thought (CoT), выполни следующие шаги для КАЖДОЙ новости из предоставленного массива:

1.  **Оценка значимости и потенциального интереса:**
    * Проанализируй заголовок и сниппет. Насколько новость важна? Может ли она вызвать общественный интерес? Есть ли в ней конкретика, указывающая на возможное будущее событие?
    * *Пример твоего рассуждения (CoT): "Новость '[название новости]' касается [краткая суть]. Это [высокая/средняя/низкая] значимость, так как [обоснование, например, 'влияет на международные отношения', 'касается крупного экономического решения', 'является локальным событием с малым резонансом']." *

2.  **Оценка возможности формулировки вопроса Да/Нет:**
    * Можно ли на основе этой новости сформулировать четкий, однозначный вопрос, на который можно ответить только "Да" или "Нет"? Есть ли в новости указание на конкретное действие, решение или измеримый результат, который может произойти или не произойти в будущем?
    * *Пример твоего рассуждения (CoT): "Для новости '[название новости]' [легко/сложно/невозможно] сформулировать вопрос 'Да/Нет', потому что [обоснование, например, 'речь идет о конкретном голосовании, которое либо состоится, либо нет', 'новость слишком общая и не содержит конкретных прогнозируемых исходов', 'событие уже произошло']." *

3.  **Принятие решения по новости:**
    * На основе анализа в п.1 и п.2, реши, стоит ли включать эту новость в кандидаты для дальнейшей работы.

После анализа ВСЕХ новостей:

4.  **Финальный отбор:**
    * Из всех новостей, которые ты счел подходящими, отбери ТОП-10 самых перспективных для создания событий. Приоритет отдавай новостям с высокой значимостью и ясной возможностью формулировки вопроса "Да/Нет".

5.  **Формирование результата:**
    * Верни результат в виде JSON-массива, содержащего только эти 10 отобранных новостей. Сохрани исходную структуру каждого объекта новости. Не добавляй свои рассуждения (CoT) в финальный JSON.

**Инструкции по выполнению:**
* Твои рассуждения (CoT) нужны для каждого шага анализа, но в итоговый JSON они входить НЕ должны.
* Сосредоточься на поиске новостей, которые могут лечь в основу событий, аналогичных по своей природе тем, что будут приведены в примерах на последующих этапах (например, о принятии законов, военных действиях, экономических решениях, подписании контрактов и т.д.).
* Если подходящих новостей меньше 10, верни столько, сколько есть.

**Ожидаемый формат вывода (JSON):**
Массив из 10 (или менее) объектов новостей, сохранивших свою первоначальную структуру.
`,
            prompt2: `Ты — эксперт по формулировке точных и однозначных вопросов для событий на рынке прогнозов. Тебе предоставлен JSON-массив из 10 новостей, отобранных на предыдущем этапе.

Используя метод Chain of Thought (CoT), для КАЖДОЙ новости из предоставленного массива выполни следующие действия:

1.  **Анализ новости для вопроса:**
    * Внимательно изучи новость (Title, Snippet). Какое ключевое потенциальное событие или исход можно из нее извлечь для рынка прогнозов?
    * *Пример твоего рассуждения (CoT): "Новость '[название новости]' сообщает о [суть новости]. Ключевым моментом для прогноза является [например, 'возможное подписание соглашения', 'проведение голосования по законопроекту', 'достижение определенного экономического показателя']." *

2.  **Формулировка вопроса Да/Нет:**
    * Преобразуй этот ключевой момент в четкий, краткий и недвусмысленный вопрос, на который можно ответить только "Да" или "Нет". Вопрос должен отражать суть потенциального события.
    * Старайся формулировать вопросы так, чтобы они были похожи по стилю на следующие примеры (это просто примеры стиля, не обязательно использовать эти темы):
        * "Состоится ли полномасштабная война между Индией и Пакистаном до конца 2025 года?"
        * "Будет ли Пакистан наносить авиаудары в ответ на военные действия Индии до 31 мая 2025 года?"
        * "Приостановит ли Пакистан действие Симлского соглашения до 30 июня 2025 года?"
        * "Увеличит ли Пакистан свой оборонный бюджет на 12% или более в финансовом году 2025–26?"
    * *Пример твоего рассуждения (CoT): "На основе анализа, вопрос может звучать так: '[сформулированный вопрос Да/Нет]?'. Эта формулировка [хороша/требует доработки], потому что [обоснование, например, 'она четко определяет событие и временные рамки (если они есть в новости)', 'она бинарна']." *

3.  **Исключение новости (если необходимо):**
    * Если, несмотря на предварительный отбор, ты обнаружишь, что из конкретной новости невозможно сформулировать корректный вопрос "Да/Нет" (например, новость оказалась слишком расплывчатой, событие уже свершилось или не поддается бинарной оценке), объясни причину и пометь эту новость для исключения.
    * *Пример твоего рассуждения (CoT): "Невозможно сформулировать корректный вопрос для новости '[название новости]', так как [причина]. Исключаю эту новость."*

4.  **Формирование результата:**
    * Верни JSON-массив новостей. Для каждой новости, для которой удалось сформулировать вопрос, добавь новое поле \`question\` (строка), содержащее этот вопрос.
    * Если новость была исключена, не включай ее в итоговый JSON-массив.
    * Твои рассуждения (CoT) не должны входить в финальный JSON.

**Ожидаемый формат вывода (JSON):**
Массив объектов новостей, где к каждому объекту добавлено поле \`question\`. Новости, для которых вопрос сформулировать не удалось, исключаются.
\`\`\`json
[
  {
    "Title": "Индия и Пакистан договорились о возобновлении переговоров по торговле",
    "URL": "[https://example.com/news/india-pakistan-talks](https://example.com/news/india-pakistan-talks)",
    "PublishedDate": "2025-05-15T10:00:00Z",
    "Source": "Example News Agency",
    "Snippet": "Представители Индии и Пакистана объявили о планах по возобновлению двусторонних торговых переговоров в следующем месяце.",
    "Region": "Asia",
    "question": "Возобновят ли Индия и Пакистан официальные торговые переговоры до конца июня 2025 года?"
  }
  // ... другие новости с добавленным полем question
]
\`\`\`
`,
            prompt3: `Ты — эксперт по созданию детализированных событий для рынка прогнозов. Тебе предоставлен JSON-массив новостей, каждая из которых содержит поля \`Title\`, \`URL\`, \`PublishedDate\`, \`Source\`, \`Snippet\`, \`Region\` и \`question\` (сформулированный вопрос Да/Нет).

Твоя задача — для КАЖДОЙ новости из этого массива сгенерировать полный JSON-объект события.

Используй метод Chain of Thought (CoT) для каждого компонента события:

1.  **Определение Подкатегории (\`subcategory\`):**
    * На основе \`Title\` и \`question\`, определи краткую (2-3 слова) подкатегорию для события.
    * *Пример твоего рассуждения (CoT): "Новость о [тема], вопрос '[question]'. Подходящая подкатегория: '[например, Военный конфликт, Экономическое решение, Законопроект, Спортивное событие]'."*

2.  **Формулировка/Уточнение Вопроса События (\`question\`):**
    * Используй предоставленное поле \`question\`. Если необходимо, слегка откорректируй его для максимальной ясности и соответствия формату рынка, но сохрани бинарность (Да/Нет). Вопрос должен быть одним предложением.
    * *Пример твоего рассуждения (CoT): "Исходный вопрос: '[исходный question]'. Он [хорош / требует небольшой корректировки для ясности]. Финальный вопрос для события: '[финальный question]'."*

3.  **Определение Временных Значений (\`bet_close\`, \`expiry\`):**
    * **Время окончания приема ставок (\`bet_close\`):** Установи дату и время окончания приема ставок. Обычно это за несколько дней или недель до предполагаемой даты экспирации, в зависимости от характера события. Если в новости есть конкретная дата события, \`bet_close\` должна быть до этой даты.
    * **Время экспирации (\`expiry\`):** Установи дату и время решения рынка. Это момент, когда ожидается официальное подтверждение исхода события.
    * Формат дат: \`DD.MM.YYYY, HH:mm GMT+03:00\`.
    * Между \`bet_close\` и \`expiry\` должен быть разумный промежуток.
    * *Пример твоего рассуждения (CoT): "Новость касается события, ожидаемого [примерная дата/период из новости или анализа]. Учитывая это, \`bet_close\` можно установить на [дата, время], а \`expiry\` на [дата, время]. Это обеспечивает [обоснование интервалов]."*

4.  **Формулировка Правил Экспирации (\`rules\`):**
    * Это самый важный раздел. Текст правил не должен превышать 2000 символов.
    * **Условия победы "Да" и "Нет":** Четко опиши, при каких обстоятельствах рынок будет решен как "Да", и при каких — как "Нет". Условия должны быть непосредственно связаны с \`question\`.
    * **Официальные источники решения:** Укажи как минимум ОДИН релевантный официальный источник для подтверждения исхода (например, сайт государственного органа, международной организации). Приведи прямую ссылку на главный сайт организации (например, \`https://www.mea.gov.in\`, \`https://mod.gov.pk\`, \`https://www.un.org/securitycouncil\`, \`https://www.president.gov.ua\`, \`https://www.rada.gov.ua\`).
    * **Консенсус СМИ:** Предусмотри консенсус ТРЁХ ведущих международных СМИ: BBC (\`https://www.bbc.com\`), Reuters (\`https://www.reuters.com\`), Associated Press (\`https://www.apnews.com\`).
    * **Задержка экспирации:** Включи стандартную фразу: "Администрация имеет право задержать экспирацию до 1–2 недель, если ситуация спорная."
    * **Часовой пояс и поддержка:** Включи стандартную фразу: "Все указанные сроки соответствуют киевскому часовому поясу (EET, UTC +2/UTC +3) на момент истечения срока действия. Все спорные вопросы решаются через техническую поддержку или сообщество Telegram."
    * *Пример твоего рассуждения (CoT): "Для вопроса '[question]' условием 'Да' будет [описание условия Да]. Условием 'Нет' будет [описание условия Нет]. Подходящий официальный источник: [название и ссылка]. СМИ: BBC, Reuters, AP. Добавляю стандартные оговорки о задержке и часовом поясе."*

5.  **Формирование Итогового JSON:**
    * Собери все сгенерированные поля в один JSON-объект для текущей новости.
    * Структура объекта должна быть следующей:
        \`\`\`json
        {
          "subcategory": "...",
          "question": "...?",
          "bet_close": "DD.MM.YYYY, HH:mm GMT+03:00",
          "expiry": "DD.MM.YYYY, HH:mm GMT+03:00",
          "rules": "..."
        }
        \`\`\`
    * Твои рассуждения (CoT) не должны входить в финальный JSON-объект события.

**Ключевые Инструкции и Примеры для Качества Генерации (Few-shot learning):**
* **Стиль и Содержание:** Генерируемые тобой события должны быть максимально похожи по структуре, детализации и формулировкам на следующие **УСПЕШНЫЕ ПРИМЕРЫ**. Используй их как образец:

    *Пример Успешного События 1:*
    \`\`\`json

                    const errorData = await response.json();
                    console.error("Gemini API Error Response:", errorData);
                    const errorMessage = `Ошибка API Gemini: ${response.status} ${response.statusText}. ${errorData?.error?.message || 'Подробности в консоли.'}`;
                    appendMessage(errorMessage, 'model');
                    chatHistory.push({ role: "model", parts: [{ text: `Error: ${errorMessage}` }] });
                    return;
                }

                const result = await response.json();

                if (result.candidates && result.candidates.length > 0 &&
                    result.candidates[0].content && result.candidates[0].content.parts &&
                    result.candidates[0].content.parts.length > 0) {
                    const modelResponse = result.candidates[0].content.parts[0].text;
                    appendMessage(modelResponse, 'model');
                    chatHistory.push({ role: "model", parts: [{ text: modelResponse }] });
                } else {
                    console.error("Неожиданная структура ответа от Gemini API:", result);
                    const errorMessage = "Не удалось получить ответ от Gemini. Структура ответа неверна.";
                    appendMessage(errorMessage, 'model');
                    chatHistory.push({ role: "model", parts: [{ text: `Error: ${errorMessage}` }] });
                }
            } catch (error) {
                removeLoadingIndicator();
                console.error('Ошибка при вызове Gemini API:', error);
                const errorMessage = `Ошибка при отправке запроса: ${error.message}. Подробности в консоли.`;
                appendMessage(errorMessage, 'model');
                chatHistory.push({ role: "model", parts: [{ text: `Error: ${errorMessage}` }] });
            }
        }

        // Event listeners for main prompt copy buttons
        document.getElementById('btnPrompt1').addEventListener('click', () => copyToClipboard(prompts.prompt1, 'Промпт 1'));
        document.getElementById('btnPrompt2').addEventListener('click', () => copyToClipboard(prompts.prompt2, 'Промпт 2'));
        document.getElementById('btnPrompt3').addEventListener('click', () => copyToClipboard(prompts.prompt3, 'Промпт 3'));
        document.getElementById('btnPrompt4').addEventListener('click', () => copyToClipboard(prompts.prompt4, 'Промпт 4'));
        document.getElementById('btnPrompt5').addEventListener('click', () => copyToClipboard(prompts.prompt5, 'Промпт 5'));

        // Event listeners for inserting prompts into chat
        function insertPromptToChat(promptKey) {
            const promptText = prompts[promptKey];
            if (promptText) {
                chatInput.value = promptText;
                chatInput.focus();
                 feedbackDiv.textContent = `"${promptKey.replace('prompt', 'Промпт ')}" вставлен в чат.`;
                 feedbackDiv.className = 'text-center font-semibold h-8 mb-6 text-sky-400';
                 setTimeout(() => { feedbackDiv.textContent = ''; }, 3000);
            }
        }
        document.getElementById('btnChatPrompt1').addEventListener('click', () => insertPromptToChat('prompt1'));
        document.getElementById('btnChatPrompt2').addEventListener('click', () => insertPromptToChat('prompt2'));
        document.getElementById('btnChatPrompt3').addEventListener('click', () => insertPromptToChat('prompt3'));
        document.getElementById('btnChatPrompt4').addEventListener('click', () => insertPromptToChat('prompt4'));
        document.getElementById('btnChatPrompt5').addEventListener('click', () => insertPromptToChat('prompt5'));

        // Chat send button and Enter key
        sendChatButton.addEventListener('click', sendMessageToGemini);
        chatInput.addEventListener('keypress', function(event) {
            if (event.key === 'Enter') {
                sendMessageToGemini();
            }
        });

    </script>
</body>
</html>
